<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lupiara Beauty</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff5f8;
color:#444;
}

header{
background:linear-gradient(135deg,#ffd6e8,#f7b5d0);
text-align:center;
padding:40px 20px;
}

header img{
width:170px;
border-radius:20px;
margin-bottom:20px;
}

header h1{
color:#c2185b;
font-size:40px;
}

header p{
margin-top:10px;
font-size:18px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#d63384;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#b51f69;
}

.menu{
background:white;
position:sticky;
top:0;
display:flex;
justify-content:center;
gap:20px;
padding:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
z-index:1000;
}

.menu a{
text-decoration:none;
color:#d63384;
font-weight:bold;
}

section{
padding:50px 20px;
}

section h2{
text-align:center;
color:#d63384;
margin-bottom:30px;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
}

.producto{
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.producto img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.producto h3{
color:#d63384;
margin-bottom:10px;
}

.producto p{
margin-bottom:10px;
}

footer{
background:#ffd6e8;
padding:30px;
text-align:center;
margin-top:40px;
}

</style>
